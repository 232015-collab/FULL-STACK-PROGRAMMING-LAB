<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Management System - ES6 Class-based implementation with student cards">
    <title>Student Management System | ES6 Class</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="task1.css">
</head>

<body>

    <div class="main-wrapper">

        <header class="header">
            <div class="header-badge">ES6 Lab — Task 1</div>
            <h1>Student Management<br><span>System</span></h1>
            <p>ES6 <code>Class</code>-based implementation with student records</p>
        </header>

        <section class="stats-section">
            <div class="stat-box">
                <h2 id="totalStudents">0</h2>
                <p>Total Students</p>
            </div>
            <div class="stat-box">
                <h2 id="totalCourses">0</h2>
                <p>Total Courses</p>
            </div>
            <div class="stat-box">
                <h2 id="avgSemester">0</h2>
                <p>Avg Semester</p>
            </div>
        </section>

        <section class="students-section">
            <div id="studentsContainer" class="students-grid"></div>
        </section>

    </div>

    <script src="task1.js"></script>
</body>

</html>
