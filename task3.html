<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="description" content="ES6 Promises Demo - Async user fetching with Promise .then/.catch pattern">
    <title>Async User Fetch | ES6 Promises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
