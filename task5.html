<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ES6 Map Demo - Product catalog management using Map data structure">
    <title>Product Catalog | ES6 Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="task5.css">
</head>

<body>

    <div class="main-wrapper">

        <header class="header">
            <div class="header-badge">ES6 Lab — Task 5</div>
            <h1>Product Catalog</h1>
            <p>Using <code>Map</code> for key-value product storage — with search &amp; delete operations</p>
        </header>

        <section class="stats-section">
            <div class="stat-box" id="statBox">
                <h2 id="totalProducts">0</h2>
                <p>Active Products</p>
            </div>
            <div class="stat-box deleted-box">
                <h2>1</h2>
                <p>Deleted Product</p>
            </div>
        </section>

        <section class="products-section">
            <div id="productsContainer" class="products-grid"></div>
        </section>

        <section class="deleted-note">
            <div class="note-card">
                <span class="note-icon">🗑️</span>
                <p><strong>Mouse (ID: 4)</strong> was deleted using <code>products.delete(4)</code> — no longer in the
                    catalog.</p>
            </div>
        </section>

    </div>

    <script src="task5.js"></script>
</body>

</html>
